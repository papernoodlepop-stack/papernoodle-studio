<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Cheong-ah Hwang</title>
<style>
  :root {
    --bg: #121210;
    --surface: #1a1a17;
    --border: rgba(255,255,255,0.08);
    --text-primary: #ece9e2;
    --text-secondary: #9a9a90;
    --text-muted: #6b6a62;
    --accent: #c98a52;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Helvetica Neue', Arial, sans-serif;
  }

  header.site-header {
    padding: 3.5rem 2rem 2rem;
    max-width: 1200px;
    margin: 0 auto;
  }
  header.site-header h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 400;
    font-size: clamp(2rem, 5vw, 3.2rem);
    margin: 0 0 0.4rem;
    letter-spacing: 0.01em;
  }
  header.site-header p {
    color: var(--text-secondary);
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin: 0;
  }

  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1rem 2rem 4rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 0.75rem;
  }

  .category-section {
    margin-bottom: 3.5rem;
  }
  .category-heading {
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 400;
    font-size: 1.4rem;
    margin: 0 0 1.25rem;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
  }

  .tile {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 4 / 5;
    transition: transform 0.25s ease, border-color 0.25s ease;
  }
  .tile:hover, .tile:focus-visible {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.2);
  }
  .tile:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .tile img, .tile video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .tile .video-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(18,18,16,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .tile .video-badge svg { width: 12px; height: 12px; fill: #ece9e2; }

  .tile .caption {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 0.7rem 0.9rem;
    background: linear-gradient(to top, rgba(0,0,0,0.65), transparent);
    font-size: 0.85rem;
    letter-spacing: 0.02em;
    color: #f2f0ea;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .tile:hover .caption, .tile:focus-visible .caption {
    opacity: 1;
    transform: translateY(0);
  }

  footer a,
footer a:visited,
footer a:hover,
footer a:active {
  color: #bebebe;
}

  /* Lightbox */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(8,8,7,0.92);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease;
    padding: 2rem;
  }
  .lightbox.open {
    opacity: 1;
    visibility: visible;
  }
  .lightbox-content {
    position: relative;
    max-width: 90vw;
    max-height: 88vh;
    transform: scale(0.94);
    transition: transform 0.3s ease;
  }
  .lightbox.open .lightbox-content {
    transform: scale(1);
  }
  .lightbox-content img,
  .lightbox-content video {
    max-width: 90vw;
    max-height: 88vh;
    display: block;
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .lightbox-caption {
    text-align: center;
    color: var(--text-secondary);
    font-size: 0.85rem;
    margin-top: 0.9rem;
    letter-spacing: 0.03em;
  }

  .lightbox-close {
    position: fixed;
    top: 1rem;
    right: 1.2rem;
    background: rgba(8,8,7,0.6);
    border: none;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    color: var(--text-primary);
    font-size: 1.8rem;
    line-height: 1;
    cursor: pointer;
    z-index: 1001;
  }
  .lightbox-close:hover { color: var(--accent); }

  .lightbox-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: var(--text-primary);
    font-size: 2.2rem;
    cursor: pointer;
    padding: 0.5rem 1rem;
    opacity: 0.65;
    transition: opacity 0.2s ease;
  }
  .lightbox-nav:hover { opacity: 1; }
  .lightbox-nav.prev { left: 0.5rem; }
  .lightbox-nav.next { right: 0.5rem; }

  @media (max-width: 600px) {
    header.site-header { padding: 2rem 1.2rem 1.5rem; }
    main { padding: 0.5rem 1.2rem 3rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 0.5rem; }
    .lightbox-nav { font-size: 1.6rem; padding: 0.4rem 0.6rem; }
  }
</style>
</head>
<body>

<header class="site-header">
  <h1>Portfolio <span style="font-size: 0.5em; color: #bebebe; font-weight: 400;">— Cheong-ah Hwang</span></h1>
</header>

<main>
  <div id="gallery"></div>
</main>

<footer style="text-align:center; padding: 1rem 2rem 3rem; border-top: 1px solid var(--border); margin-top: -1.5rem;">
  <div style="font-size: 1.2rem; letter-spacing: 0.03em; font-family: Georgia;">
    <a href="http://www.papernoodle.com" style="text-decoration: none; font-weight: 400;">Main site</a>
    <span style="color: var(--text-muted); margin: 0 0.4rem;">·</span>
    <a href="https://www.behance.net/cheongahhwang" style="text-decoration: none; font-weight: 400;">Behance</a>
    <span style="color: var(--text-muted); margin: 0 0.4rem;">·</span>
    <a href="mailto:papernoodlepop@gmail.com" style="text-decoration: none; font-weight: 400;">Email</a>
  </div>
</footer>

<div class="lightbox" id="lightbox">
  <div class="lightbox-content" id="lightbox-content"></div>
  <button class="lightbox-nav prev" id="prev-btn" aria-label="Previous">&#8249;</button>
  <button class="lightbox-nav next" id="next-btn" aria-label="Next">&#8250;</button>
</div>

<script>
  /*
    ---- HOW TO ADD YOUR WORK ----
    Edit the `works` array below. Each entry needs:
      category: the section heading this piece belongs under
      type: "image", "video", or "youtube"
      thumb: path to the small grid thumbnail (always an image, even for video — use a poster frame)
      src: path to the full-resolution image, the video file, OR the YouTube video ID (for youtube type)
      title: caption shown on hover and in the lightbox
      poster: (video only, optional) a poster image shown before playback starts

    For type: "youtube" — src is just the video ID (the part after "v=" in a
    YouTube URL, e.g. "dQw4w9WgXcQ" from youtube.com/watch?v=dQw4w9WgXcQ — strip
    off any extra params like "&t=15s").
    A good thumb for these is: https://img.youtube.com/vi/VIDEO_ID/hqdefault.jpg

    Items are grouped into sections by `category`, in the order each category
    first appears below.
  */
  const works = [
    { category: "Paper sculptures", type: "image", thumb: "images/relief-01.jpg", src: "images/relief-01.jpg", title: "relief-01" },
    { category: "Paper sculptures", type: "image", thumb: "images/relief-02.jpg", src: "images/relief-02.jpg", title: "relief-02" },
    { category: "Paper sculptures", type: "image", thumb: "images/relief-03.jpg", src: "images/relief-03.jpg", title: "relief-03" },
    { category: "Paper sculptures", type: "image", thumb: "images/relief-04.jpg", src: "images/relief-04.jpg", title: "relief-04" },
    { category: "Paper sculptures", type: "image", thumb: "images/relief-05.jpg", src: "images/relief-05.jpg", title: "relief-05" },
    { category: "Paper sculptures", type: "image", thumb: "images/relief-06.jpg", src: "images/relief-06.jpg", title: "relief-06" },
    { category: "Paper sculptures", type: "image", thumb: "images/sculpt-01.jpg", src: "images/sculpt-01.jpg", title: "sculpture-01" },
    { category: "Paper sculptures", type: "image", thumb: "images/sculpt-02.jpg", src: "images/sculpt-02.jpg", title: "sculpture-02" },
    { category: "Paper sculptures", type: "image", thumb: "images/sculpt-03.jpg", src: "images/sculpt-03.jpg", title: "sculpture-03" },
    { category: "Paper sculptures", type: "image", thumb: "images/sculpt-04.jpg", src: "images/sculpt-04.jpg", title: "sculpture-04" },

    { category: "Pop-ups", type: "image", thumb: "images/popup-01.jpg", src: "images/popup-01.jpg", title: "popup-01" },
    { category: "Pop-ups", type: "image", thumb: "images/popup-02.jpg", src: "images/popup-02.jpg", title: "popup-02" },
    { category: "Pop-ups", type: "image", thumb: "images/popup-03.jpg", src: "images/popup-03.jpg", title: "popup-03" },
    { category: "Pop-ups", type: "image", thumb: "images/popup-04.jpg", src: "images/popup-04.jpg", title: "popup-04" },
    { category: "Pop-ups", type: "image", thumb: "images/popup-05.jpg", src: "images/popup-05.jpg", title: "popup-05" },
    { category: "Pop-ups", type: "youtube", thumb: "images/popupinstallation_thumb-01.jpg", src: "kue-NlxZGe4", title: "Public installation" },

    { category: "Blender 3D animations", type: "video", thumb: "images/blender_thumb-01.jpg", src: "videos/blender-01.mp4", title: "Blender anim-01" },
    { category: "Blender 3D animations", type: "video", thumb: "images/blender_thumb-02.jpg", src: "videos/blender-02.mp4", title: "Blender anim-02" },
    { category: "Blender 3D animations", type: "video", thumb: "images/blender_thumb-03.jpg", src: "videos/blender-03.mp4", title: "Blender anim-03" },
    { category: "Blender 3D animations", type: "video", thumb: "images/blender_thumb-04.jpg", src: "videos/blender-04.mp4", title: "Blender anim-04" },
    { category: "Blender 3D animations", type: "video", thumb: "images/blender_thumb-05.jpg", src: "videos/blender-05.mp4", title: "Blender anim-05" },

    { category: "Technical projects", type: "image", thumb: "images/esp32-01.jpg", src: "images/esp32-01.jpg", title: "Microcontroller-01" },
    { category: "Technical projects", type: "image", thumb: "images/esp32-02.jpg", src: "images/esp32-02.jpg", title: "Microcontroller-02" },
    { category: "Technical projects", type: "video", thumb: "images/alarm_thumb.jpg", src: "videos/esp32-01.mp4", title: "Alarm system" },
    { category: "Technical projects", type: "video", thumb: "images/mechanical_thumb.jpg", src: "videos/mechanism_combo.mp4", title: "Mechanism combo" },

    { category: "Broad & High", type: "youtube", thumb: "https://img.youtube.com/vi/u_VxwjE8hRo/hqdefault.jpg", src: "u_VxwjE8hRo", title: "Broad & High" },
  ];

  const gallery = document.getElementById("gallery");
  const lightbox = document.getElementById("lightbox");
  const lightboxContent = document.getElementById("lightbox-content");
  const prevBtn = document.getElementById("prev-btn");
  const nextBtn = document.getElementById("next-btn");

  let currentIndex = 0;

  function videoIcon() {
    return `<span class="video-badge"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span>`;
  }

  works.forEach((work, i) => {
    // find or create the section for this work's category
    let section = gallery.querySelector(`section[data-category="${CSS.escape(work.category)}"]`);
    if (!section) {
      section = document.createElement("section");
      section.className = "category-section";
      section.dataset.category = work.category;
      section.innerHTML = `<h2 class="category-heading">${work.category}</h2><div class="grid"></div>`;
      gallery.appendChild(section);
    }
    const grid = section.querySelector(".grid");

    const tile = document.createElement("div");
    tile.className = "tile";
    tile.tabIndex = 0;
    tile.setAttribute("role", "button");
    tile.setAttribute("aria-label", `View ${work.title}`);
    tile.innerHTML = `
      <img src="${work.thumb}" alt="${work.title}" loading="lazy">
      ${(work.type === "video" || work.type === "youtube") ? videoIcon() : ""}
      <div class="caption">${work.title}</div>
    `;
    tile.addEventListener("click", () => openLightbox(i));
    tile.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openLightbox(i); }
    });
    grid.appendChild(tile);
  });

  function renderLightboxItem(index) {
    const work = works[index];
    lightboxContent.innerHTML = "";

    let mediaEl;
    if (work.type === "youtube") {
      mediaEl = document.createElement("iframe");
      mediaEl.src = `https://www.youtube.com/embed/${work.src}?autoplay=1&rel=0&modestbranding=1`;
      mediaEl.title = work.title;
      mediaEl.frameBorder = "0";
      mediaEl.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture";
      mediaEl.allowFullscreen = true;
      mediaEl.style.width = "min(90vw, 960px)";
      mediaEl.style.height = "min(88vh, 540px)";
      mediaEl.style.border = "none";
      mediaEl.style.borderRadius = "4px";
    } else if (work.type === "video") {
      mediaEl = document.createElement("video");
      mediaEl.src = work.src;
      if (work.poster) mediaEl.poster = work.poster;
      mediaEl.controls = true;
      mediaEl.autoplay = true;
      mediaEl.playsInline = true;
      mediaEl.preload = "auto";
    } else {
      mediaEl = document.createElement("img");
      mediaEl.src = work.src;
      mediaEl.alt = work.title;
    }

    const closeBtn = document.createElement("button");
    closeBtn.className = "lightbox-close";
    closeBtn.setAttribute("aria-label", "Close");
    closeBtn.innerHTML = "&times;";
    closeBtn.addEventListener("click", closeLightbox);

    const caption = document.createElement("div");
    caption.className = "lightbox-caption";
    caption.textContent = work.title;

    lightboxContent.appendChild(closeBtn);
    lightboxContent.appendChild(mediaEl);
    lightboxContent.appendChild(caption);
  }

  function openLightbox(index) {
    currentIndex = index;
    renderLightboxItem(currentIndex);
    lightbox.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function stopActiveMedia() {
    // native video: pause it. youtube iframe: remove it (no direct pause API
    // without the full YouTube JS SDK, so clearing the iframe stops playback).
    const video = lightboxContent.querySelector("video");
    if (video) video.pause();
    const iframe = lightboxContent.querySelector("iframe");
    if (iframe) iframe.remove();
  }

  function closeLightbox() {
    stopActiveMedia();
    lightbox.classList.remove("open");
    document.body.style.overflow = "";
  }

  function showNext(offset) {
    stopActiveMedia();
    currentIndex = (currentIndex + offset + works.length) % works.length;
    renderLightboxItem(currentIndex);
  }

  prevBtn.addEventListener("click", () => showNext(-1));
  nextBtn.addEventListener("click", () => showNext(1));

  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) closeLightbox();
  });

  document.addEventListener("keydown", (e) => {
    if (!lightbox.classList.contains("open")) return;
    if (e.key === "Escape") closeLightbox();
    if (e.key === "ArrowLeft") showNext(-1);
    if (e.key === "ArrowRight") showNext(1);
  });
</script>

</body>
</html>
