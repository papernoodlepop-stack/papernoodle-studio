<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Papernoodle Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, sans-serif;
    background: #0f0f0f;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 24px 16px;
  }

  h1 { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: #fff; }
  h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: #aaa;
       text-transform: uppercase; letter-spacing: 0.05em; }

  .btn-done {
    background: #00c853; color: #000;
    width: 100%; padding: 14px;
    font-size: 15px; font-weight: 600;
    border: none; border-radius: 8px;
    cursor: pointer; margin-bottom: 20px;
    display: none;
  }
  .btn-done.visible { display: block; }

  #slot-status {
    background: #1a1a1a; border-radius: 12px;
    padding: 16px 20px; margin-bottom: 24px;
    display: flex; align-items: center; gap: 16px;
  }

  #status-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: #555; flex-shrink: 0; transition: background 0.3s;
  }
  #status-dot.idle            { background: #00c853; }
  #status-dot.reserved        { background: #ff9800; }
  #status-dot.pending_payment { background: #ff9800; }
  #status-dot.production      { background: #e53935; animation: pulse 1s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.4; }
  }

  #status-info   { flex: 1; }
  #status-text   { font-size: 15px; }

  #status-countdown-wrap {
    display: flex; flex-direction: column;
    align-items: flex-end; gap: 2px; min-width: 72px;
  }
  #status-countdown {
    font-size: 26px; font-weight: 700; color: #fff;
    text-align: right; font-variant-numeric: tabular-nums; letter-spacing: -0.5px;
  }
  #status-countdown.overtime { color: #e53935; }
  #countdown-label {
    font-size: 10px; color: #555; text-align: right;
    text-transform: uppercase; letter-spacing: 0.06em;
  }

  #orders-list { display: flex; flex-direction: column; gap: 20px; }

  .order-card {
    background: #1a1a1a; border-radius: 12px;
    padding: 20px; display: flex; flex-direction: column; gap: 16px;
  }
  .order-card.latest { border: 1px solid #00c853; }

  .order-meta        { display: flex; flex-direction: column; gap: 6px; font-size: 13px; color: #888; }
  .order-meta strong { color: #fff; font-size: 15px; }
  .order-amount      { font-size: 20px; font-weight: 700; color: #00c853; }

  .design-wrap { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
  .design-canvas-container {
    position: relative; width: 180px; aspect-ratio: 5/7;
    background: #7a7a7a; border: 2px solid #888;
    border-radius: 4px; overflow: hidden; flex-shrink: 0;
  }
  .design-box {
    position: absolute; background-size: contain;
    background-repeat: no-repeat; background-position: center;
  }
  .design-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  button { padding: 8px 16px; border: none; border-radius: 8px;
           font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-save { background: #fff; color: #000; }

  .empty-state { color: #555; font-size: 14px; padding: 40px 0; text-align: center; }
</style>
</head>
<body>

<h1>Papernoodle Admin</h1>
<button id="doneBtn" class="btn-done">Mark Done &amp; Notify</button>

<div id="slot-status">
  <div id="status-dot"></div>
  <div id="status-info"><div id="status-text">Connecting…</div></div>
  <div id="status-countdown-wrap">
    <div id="status-countdown"></div>
    <div id="countdown-label"></div>
  </div>
</div>

<h2>Orders</h2>
<div id="orders-list"><p class="empty-state">Loading…</p></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
// These must stay in sync with CONFIG.thumbImages / thumbSizes / thumbScale
// in the editor (script.js) — same order, same index per object type.
const THUMB_IMAGES = [
  "/thumb/cockatoo.png",
  "/thumb/hummingbird.png",
  "/thumb/heart.png",
  "/thumb/branch.png",
  "/thumb/spiral.png",
  "/thumb/grass.png",
  "/thumb/bubble.png",
  "/thumb/fuchsia.png",
];

const THUMB_NAMES = [
  "Cockatoo", "Hummingbird", "Heart", "Branch",
  "Spiral",   "Grass",       "Bubble", "Fuchsia",
];

const THUMB_LIMITS = [1, 1, 5, 1, 3, 1, 5, 2]; 

const THUMB_SIZES = [
  { w: 144, h: 110 },
  { w: 100, h:  81 },
  { w:  60, h:  67 },
  { w: 120, h:  89 },
  { w:  90, h:  79 },
  { w: 144, h: 118 },
  { w:  60, h:  57 },
  { w:  80, h: 132 },
];

const THUMB_SCALE = [2.8, 2.7, 1.2, 3.2, 2.4, 3.3, 1.2, 2.3];

// How translucent each material is — same values and index order as
// CONFIG.thumbOpacity in script.js. This lets overlapping objects compound
// visually the same way they do in the customer's own preview, instead of
// every layer rendering fully opaque here.
const THUMB_OPACITY = [0.6, 0.6, 0.6, 0.6, 0.6, 0.6, 0.6, 0.6];

const CANVAS_W = 180, CANVAS_H = CANVAS_W * 7 / 5;

// The editor stores each object's on-screen pixel size (thumbSizes * thumbScale)
// but that's sized for the editor's own canvas, not this 180px-wide preview.
// This one constant maps "editor pixels" down to "admin preview pixels" —
// tune it by eye against a real printed order until proportions look right,
// then it applies correctly to every design from then on.
const ADMIN_SCALE = 0.5;

// ── DOM ──────────────────────────────────────────────────────────────────────
const dot            = document.getElementById("status-dot");
const statusTxt      = document.getElementById("status-text");
const countdownEl    = document.getElementById("status-countdown");
const countdownLabel = document.getElementById("countdown-label");
const doneBtn        = document.getElementById("doneBtn");

// ── SSE STATE ─────────────────────────────────────────────────────────────────
let lastData        = null;
let anchorWall      = null;
let anchorServerNow = null;

const STATUS_LABELS = {
  idle:            "Slot open",
  reserved:        "Checkout in progress",
  pending_payment: "Payment pending",
  production:      "In production",
};

// ── ORDER ALERT SOUND ────────────────────────────────────────────────────────
// Plays a short, attention-getting tone the moment a real order comes
// through — useful when you're not staring at the screen during an event.
let audioCtx = null;
document.addEventListener("click", () => {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } else if (audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}, { once: true });

function playOrderAlert() {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const now = audioCtx.currentTime;
    // Three quick ascending beeps — distinct enough to notice, short enough
    // not to be annoying.
    [523.25, 659.25, 783.99].forEach((freq, i) => {
      const osc  = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      const start = now + i * 0.15;
      gain.gain.setValueAtTime(0.001, start);
      gain.gain.exponentialRampToValueAtTime(0.3, start + 0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, start + 0.25);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(start);
      osc.stop(start + 0.3);
    });
  } catch (err) {
    console.error("[alert sound] failed:", err);
  }
}

function connectSSE() {
  const sse = new EventSource("/admin/events");

  sse.onmessage = (e) => {
    const d        = JSON.parse(e.data);
    const prevStatus = lastData?.status;
    lastData       = d;
    anchorWall     = performance.now();
    anchorServerNow = d.now;

    dot.className         = d.status;
    statusTxt.textContent = STATUS_LABELS[d.status] || d.status;
    doneBtn.classList.toggle("visible", d.status === "production");

    // Fire the alert and refresh the order list the moment we transition
    // INTO production — not on every tick while already there, just the
    // actual moment a new order completes.
    if (d.status === "production" && prevStatus !== "production") {
      playOrderAlert();
      loadOrders();
    }
  };

  sse.onerror = () => {
    sse.close();
    lastData = anchorWall = anchorServerNow = null;
    statusTxt.textContent = "Reconnecting…";
    dot.className = "";
    setTimeout(connectSSE, 2000);
  };
}

connectSSE();

// ── COUNTDOWN TICKER ─────────────────────────────────────────────────────────
setInterval(() => {
  if (!lastData) {
    countdownEl.textContent    = "";
    countdownLabel.textContent = "";
    return;
  }

  const elapsed   = anchorWall != null ? performance.now() - anchorWall : 0;
  const serverNow = anchorServerNow != null ? anchorServerNow + elapsed : Date.now();

  const { status, reservationEndsAt, productionEndsAt } = lastData;

  if (status === "idle") {
    countdownEl.textContent    = "";
    countdownLabel.textContent = "";
    countdownEl.classList.remove("overtime");
    return;
  }

  if (status === "reserved" || status === "pending_payment") {
    const secs = reservationEndsAt
      ? Math.max(0, Math.ceil((reservationEndsAt - serverNow) / 1000))
      : 0;
    countdownEl.textContent    = formatSecs(secs);
    countdownLabel.textContent = "reservation";
    countdownEl.classList.remove("overtime");
    return;
  }

  if (status === "production") {
    const secs = productionEndsAt
      ? Math.ceil((productionEndsAt - serverNow) / 1000)
      : 0;

    if (secs > 0) {
      countdownEl.textContent    = formatSecs(secs);
      countdownLabel.textContent = "production";
      countdownEl.classList.remove("overtime");
    } else {
      countdownEl.textContent    = "+" + formatSecs(-secs);
      countdownLabel.textContent = "overtime";
      countdownEl.classList.add("overtime");
    }
    return;
  }

  countdownEl.textContent    = "";
  countdownLabel.textContent = "";
}, 200);

function formatSecs(totalSecs) {
  const t = Math.round(Math.abs(totalSecs));
  const m = Math.floor(t / 60);
  const s = t % 60;
  return m > 0 ? `${m}:${String(s).padStart(2, "0")}` : `${s}s`;
}

// ── ORDERS ────────────────────────────────────────────────────────────────────
async function loadOrders() {
  const res    = await fetch("/admin/orders");
  const orders = await res.json();
  renderOrders(orders);
}

function renderOrders(orders) {
  const list = document.getElementById("orders-list");
  if (!orders.length) {
    list.innerHTML = '<p class="empty-state">No orders yet.</p>';
    return;
  }
  list.innerHTML = "";
  orders.forEach((order, idx) => {
    const card = document.createElement("div");
    card.className = "order-card" + (idx === 0 ? " latest" : "");
    const paid   = new Date(order.paidAt);
    const amount = ((order.amount || 0) / 100).toFixed(2);
    card.innerHTML = `
  <div class="order-meta">
    ...
  </div>
  <div class="order-amount">$${amount}</div>
  <div style="color:#888;font-size:12px;">Paid via Stripe</div>
  <div class="design-wrap">
    <div class="design-canvas-container" id="canvas-${idx}"></div>
    <div id="layers-${idx}" style="font-size:13px; color:#ccc; line-height:1.6;"></div>
    <div class="design-actions">
      <button class="btn-save" onclick='saveAsPNG(${idx}, ${JSON.stringify(order.layout)})'>Save as PNG</button>
    </div>
  </div>`;
    list.appendChild(card);
    requestAnimationFrame(() => renderDesign(order.layout, idx));
  });
}

function renderDesign(layout, idx) {
  const container = document.getElementById(`canvas-${idx}`);
  if (!container || !layout) return;

  const ordered = [...layout].sort((a, b) => (a.z ?? 0) - (b.z ?? 0));

  ordered.forEach(b => {
    const itemIdx = Number(b.origin);
    if (!THUMB_IMAGES[itemIdx]) return;

    let w, h;
    if (b.width != null && b.height != null) {
      w = b.width  * CANVAS_W;
      h = b.height * CANVAS_H;
    } else {
      const size  = THUMB_SIZES[itemIdx];
      const scale = THUMB_SCALE[itemIdx] ?? 1;
      if (!size) return;
      w = size.w * scale * ADMIN_SCALE;
      h = size.h * scale * ADMIN_SCALE;
    }

    const el = document.createElement("div");
    el.className = "design-box";
    el.style.left      = (b.left * CANVAS_W) + "px";
    el.style.top       = (b.top  * CANVAS_H) + "px";
    el.style.width     = w + "px";
    el.style.height    = h + "px";
    el.style.transform = `rotate(${b.rotation || 0}rad)`;
    el.style.backgroundImage = `url('${THUMB_IMAGES[itemIdx]}')`;
    el.style.opacity   = String(THUMB_OPACITY[itemIdx] ?? 0.6);
    container.appendChild(el);
  });

  renderLayerList(layout, idx);
}

// Text layer list, top → bottom, with instance numbers (e.g. "Bubble #3")
// for item types that allow more than one on the canvas.
function renderLayerList(layout, idx) {
  const listEl = document.getElementById(`layers-${idx}`);
  if (!listEl || !layout?.length) return;

  // Instance number isn't stored directly in layout — derive it the same
  // way the editor does: count occurrences of each origin, in the order
  // objects were originally placed (array order = placement order).
  const seqCounters = {};
  const withSeq = layout.map(b => {
    const itemIdx = Number(b.origin);
    seqCounters[itemIdx] = (seqCounters[itemIdx] || 0) + 1;
    return { ...b, _seq: seqCounters[itemIdx] };
  });

  const topDown = [...withSeq].sort((a, b) => (b.z ?? 0) - (a.z ?? 0));

  listEl.innerHTML = topDown.map((b, i) => {
    const itemIdx = Number(b.origin);
    const name    = THUMB_NAMES[itemIdx] || `Item ${itemIdx}`;
    const limit   = THUMB_LIMITS[itemIdx] || 1;
    const label   = limit > 1 ? `${name} #${b._seq}` : name;
    return `<div>${i + 1}. ${label}${i === 0 ? " (top)" : ""}</div>`;
  }).join("");
}

async function saveAsPNG(idx, layout) {
  const container = document.getElementById(`canvas-${idx}`);
  if (!container) return;
  const scale = 4;

  const seqCounters = {};
  const withSeq = layout.map(b => {
    const itemIdx = Number(b.origin);
    seqCounters[itemIdx] = (seqCounters[itemIdx] || 0) + 1;
    return { ...b, _seq: seqCounters[itemIdx] };
  });
  const topDown = [...withSeq].sort((a, b) => (b.z ?? 0) - (a.z ?? 0));
  const lines = topDown.map((b, i) => {
    const itemIdx = Number(b.origin);
    const name    = THUMB_NAMES[itemIdx] || `Item ${itemIdx}`;
    const limit   = THUMB_LIMITS[itemIdx] || 1;
    const label   = limit > 1 ? `${name} #${b._seq}` : name;
    return `${i + 1}. ${label}${i === 0 ? " (top)" : ""}`;
  });

  const textLineHeight = 26;
  const textPadding     = 16;
  const textAreaHeight  = textPadding * 2 + lines.length * textLineHeight;

  const oc  = document.createElement("canvas");
  oc.width  = CANVAS_W * scale;                         // ← design width, unchanged
  oc.height = (CANVAS_H + textAreaHeight) * scale;       // ← design height + extra space
  const ctx = oc.getContext("2d");

  // Design area — exact same size/shape as always (CANVAS_W × CANVAS_H)
  ctx.fillStyle   = "#7a7a7a";
  ctx.fillRect(0, 0, CANVAS_W * scale, CANVAS_H * scale);
  ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
  ctx.strokeRect(1, 1, CANVAS_W * scale - 2, CANVAS_H * scale - 2);

  for (const box of container.querySelectorAll(".design-box")) {
    await new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const left = parseFloat(box.style.left) * scale;
        const top  = parseFloat(box.style.top)  * scale;
        const w = parseFloat(box.style.width)  * scale;
        const h = parseFloat(box.style.height) * scale;
        const rot = parseFloat((box.style.transform.match(/rotate\(([^)]+)rad\)/) || [])[1] || 0);
        const boxOpacity = parseFloat(box.style.opacity || "1");
        ctx.save();
        ctx.globalAlpha = boxOpacity;
        ctx.translate(left + w / 2, top + h / 2);
        ctx.rotate(rot);
        ctx.drawImage(img, -w / 2, -h / 2, w, h);
        ctx.restore();
        resolve();
      };
      img.onerror = resolve;
      img.src = box.style.backgroundImage.replace(/url\(["']?/, "").replace(/["']?\)$/, "");
    });
  }

  // Text list — lives entirely in the extra appended space, below the design
  const textAreaY = CANVAS_H * scale;
  ctx.fillStyle = "#fff";
  ctx.fillRect(0, textAreaY, oc.width, textAreaHeight * scale);

  ctx.fillStyle = "#000";
  ctx.font = `${18 * scale}px sans-serif`;
  ctx.textBaseline = "top";
  lines.forEach((line, i) => {
    const y = textAreaY + (textPadding + i * textLineHeight) * scale;
    ctx.fillText(line, textPadding * scale, y);
  });

  const a    = document.createElement("a");
  a.href     = oc.toDataURL("image/png");
  a.download = `order-${idx + 1}-${new Date().toISOString().slice(0, 10)}.png`;
  a.click();
}

// ── DONE BUTTON ───────────────────────────────────────────────────────────────
doneBtn.addEventListener("click", async () => {
  doneBtn.disabled    = true;
  doneBtn.textContent = "Processing…";
  try {
    const res = await fetch("/admin/done", { method: "POST" });
    if (!res.ok) throw new Error(`Server responded ${res.status}`);
    doneBtn.textContent = "Done ✓";
  } catch (err) {
    console.error("[admin/done] failed:", err);
    doneBtn.textContent = "Failed — tap to retry";
  } finally {
    doneBtn.disabled = false;
  }
});

loadOrders();
</script>
</body>
</html>
